services:
  docker-demo:
    image: muaeabudhabi/docker-demo:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      org.titan.app: docker-demo
    environment:
    - NODE_ENV=production
    - LOG_LEVEL=info
    - PUID=99
    - PGID=100
    - UMASK=022
    volumes:
    - /mnt/user/appdata/docker-demo/data:/data
    - /mnt/user/appdata/docker-demo/config:/config
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    ports:
    - 3000:3000
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:3000/health || curl -sf http://localhost:3000/healthz
        || curl -sf http://localhost:3000/ || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
    - docker-demo_net
networks:
  docker-demo_net:
    driver: bridge
volumes:
  docker-demo_data:
    driver: local
